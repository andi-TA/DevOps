name: CI - build & lint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # clone my code
      - name: Checkout code
        uses: actions/checkout@v4

      # install node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: srcs/website/react/package-lock.json
      
      # install dependency
      - name: Install dependencies
        working-directory: srcs/website/react 
        run: npm ci
      
      # lunch lint
      - name: lint
        working-directory: srcs/website/react
        run: npm run lint
      
      # build image
      - name: Build React app
        working-directory: srcs/website/react
        run: npm run build
  
  docker:
    needs: build
    runs-on: ubuntu-latest

    steps:
      # clone my code
      - name: Checkout code
        uses: actions/checkout@v4

      # install dependency
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: srcs/website
          push: false                     
          tags: website:ci                
          cache-from: type=gha           
          cache-to: type=gha,mode=max
  
  security:
    needs: docker
    runs-on: ubuntu-latest

    steps:
      # clone my code
      - name: Checkout code
        uses: actions/checkout@v4

       # install dependency
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image for scanning
        uses: docker/build-push-action@v5
        with:
          context: srcs/website
          push: false
          tags: website:ci
          # load image to docker runner
          load: true
      
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: website:ci
          format: table
          exit-code: '1'          
          severity: 'CRITICAL'     
          ignore-unfixed: true



      