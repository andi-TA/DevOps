name: CI - build & lint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # clone my code
      - name: Checkout code
        uses: actions/checkout@v4

      # install node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: srcs/website/react/package-lock.json
      
      # install dependency
      - name: Install dependencies
        working-directory: srcs/website/react 
        run: npm-ci
      
      - name: lint
        working-directory: srcs/website/react
        run: npm run lint
      
      - name: Build React app
        working-directory: srcs/website/react
        run: npm run build
      